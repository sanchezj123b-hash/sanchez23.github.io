<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Anfitrión - ZoomOf</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #1a1a1a; color: #fff; }
        .barra-superior { background: #222; padding: 10px 20px; border-radius: 6px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #e74c3c; flex-wrap: wrap; gap: 8px; }
        .sala-espera-contenedor { background: #3a2e12; border: 2px solid #d39e00; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .lista-espera { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; min-height: 40px; }
        .tarjeta-espera { background: #222; padding: 10px 15px; border-radius: 6px; border: 1px solid #d39e00; display: flex; align-items: center; gap: 10px; }
        .contenedor-principal { display: flex; gap: 20px; flex-wrap: wrap; }
        .seccion-chat { flex: 1; min-width: 220px; background: #2a2a2a; padding: 15px; border-radius: 8px; }
        #mensajes { height: 250px; border: 1px solid #444; overflow-y: auto; padding: 10px; background: #222; margin-bottom: 10px; }
        .seccion-videos { flex: 2; min-width: 280px; background: #2a2a2a; padding: 15px; border-radius: 8px; }
        .grid-videos { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        .video-box { position: relative; background: #222; border-radius: 6px; overflow: hidden; height: 180px; border: 2px solid #444; }
        video { width: 100%; height: 100%; object-fit: cover; background: #111; }
        .video-box span { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.6); padding: 2px 6px; font-size: 12px; border-radius: 3px; z-index: 10; }
        input[type="text"] { padding: 8px; background: #333; color: white; border: none; border-radius: 4px; }
        .btn-admitir { background-color: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-admitir:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="barra-superior">
    <div>🔒 ID de sala: <strong id="lblSalaID" style="color:#ffc107; font-size:16px;">Cargando...</strong> | ROL: <strong>Anfitrión</strong></div>
    <div>⏱ Tiempo: <strong id="temporizador" style="color:#ffc107;">30:00</strong></div>
    <button style="background:#dc3545;color:white;padding:6px 12px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;" onclick="cerrarSalaForzada()">Finalizar para Todos</button>
</div>

<div class="sala-espera-contenedor">
    <strong>⏳ Sala de Espera — usuarios esperando aprobación:</strong>
    <div id="contenedorEspera" class="lista-espera">
        <span style="color:#888; font-size:13px;">Nadie esperando aún...</span>
    </div>
</div>

<div class="contenedor-principal">
    <div class="seccion-chat">
        <div id="mensajes"></div>
        <div style="display:flex;gap:5px;">
            <input type="text" id="txtMensaje" placeholder="Escribe un mensaje..." style="width:100%;">
            <button style="background:#0e71eb;color:white;padding:6px 12px;border:none;border-radius:4px;cursor:pointer;" onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>
    <div class="seccion-videos">
        <button id="btnCamara" style="background:#28a745;color:white;margin-bottom:15px;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;" onclick="controlarCamaraLocal()">Encender Cámara/Audio</button>
        <div class="grid-videos" id="salaVideos">
            <div class="video-box" id="box-local">
                <video id="localVideo" autoplay playsinline muted></video>
                <span id="lblNombreLocal">Tú (Anfitrión)</span>
            </div>
        </div>
    </div>
</div>

<!-- Supabase carga primero, luego el script de la app -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// =============================================
//  PEGA AQUÍ TUS CREDENCIALES DE SUPABASE
// =============================================
const SUPABASE_URL = "https://TU_PROYECTO.supabase.co";
const SUPABASE_KEY = "TU_ANON_KEY_AQUI";
// =============================================

const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

// Leer parámetros — doble decode por si vienen doblemente codificados
const params   = new URLSearchParams(window.location.search);
const salaID   = decodeURIComponent(params.get("id")     || "");
const miNombre = decodeURIComponent(params.get("nombre") || "Anfitrión");

if (!salaID) { window.location.href = "index.html"; }

// Mostrar ID y nombre en pantalla inmediatamente
document.getElementById("lblSalaID").textContent      = salaID;
document.getElementById("lblNombreLocal").textContent  = "Tú (Anfitrión) - " + miNombre;
document.title = "Anfitrión - " + salaID;

let canal          = null;
let miStream       = null;
let conexionesPeer = {};
let enEspera       = [];
let segundos       = 30 * 60;
let timerId        = null;

// ── TEMPORIZADOR (arranca solo, independiente de Supabase) ──
function arrancarTemporizador() {
    timerId = setInterval(() => {
        segundos--;
        const m = Math.floor(segundos / 60);
        const s = segundos % 60;
        document.getElementById("temporizador").innerText =
            (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
        if (segundos <= 0) { clearInterval(timerId); cerrarSalaForzada(); }
    }, 1000);
}

// ── INICIAR SUPABASE ────────────────────────────────────────
function iniciar() {
    if (!window.supabase) {
        console.error("❌ Supabase no cargó. Verifica tu conexión a internet.");
        return;
    }

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    canal = sb.channel("sala:" + salaID, {
        config: { broadcast: { self: false } }
    });

    canal
        .on("broadcast", { event: "señal" }, ({ payload }) => manejarSenal(payload))
        .subscribe((status) => {
            console.log("Canal estado:", status);
        });

    document.getElementById("txtMensaje").addEventListener("keypress", e => {
        if (e.key === "Enter") enviarMensaje();
    });
}

// ── ENVIAR SEÑAL ────────────────────────────────────────────
function enviarSenal(payload) {
    if (canal) canal.send({ type: "broadcast", event: "señal", payload });
}

// ── MANEJAR SEÑALES ─────────────────────────────────────────
function manejarSenal(data) {
    if (!data || !data.tipo) return;
    const remoto = data.nombre;
    if (!remoto || remoto === miNombre) return;

    console.log("Señal recibida:", data.tipo, "de:", remoto);

    switch (data.tipo) {
        case "solicitar_entrada":
            agregarAListaEspera(remoto);
            break;
        case "mensaje":
            mostrarMensaje(remoto, data.mensaje);
            break;
        case "camara_apagada": {
            const v = document.getElementById("video-" + remoto);
            if (v) v.srcObject = null;
            break;
        }
        case "offer":
            if (data.destinatario === miNombre) recibirOffer(remoto, data.sdp);
            break;
        case "answer":
            if (data.destinatario === miNombre && conexionesPeer[remoto])
                conexionesPeer[remoto].setRemoteDescription(new RTCSessionDescription(data.sdp));
            break;
        case "candidate":
            if (data.destinatario === miNombre && conexionesPeer[remoto])
                conexionesPeer[remoto].addIceCandidate(new RTCIceCandidate(data.candidate)).catch(() => {});
            break;
    }
}

// ── SALA DE ESPERA ──────────────────────────────────────────
function agregarAListaEspera(nombre) {
    if (!nombre || nombre === miNombre) return;
    if (enEspera.some(u => u.toLowerCase() === nombre.toLowerCase())) return;
    enEspera.push(nombre);
    renderizarEspera();
}

function renderizarEspera() {
    const c = document.getElementById("contenedorEspera");
    c.innerHTML = "";

    if (enEspera.length === 0) {
        c.innerHTML = '<span style="color:#888;font-size:13px;">Nadie esperando aún...</span>';
        return;
    }

    enEspera.forEach(user => {
        const div = document.createElement("div");
        div.className = "tarjeta-espera";

        const span = document.createElement("span");
        span.innerHTML = "👤 <strong>" + user + "</strong>";

        const btn = document.createElement("button");
        btn.className = "btn-admitir";
        btn.textContent = "✅ Admitir";
        btn.onclick = function() { admitirUsuario(user); };

        div.appendChild(span);
        div.appendChild(btn);
        c.appendChild(div);
    });
}

function admitirUsuario(user) {
    enviarSenal({ tipo: "entrada_aprobada", nombre: miNombre, destinatario: user });
    enEspera = enEspera.filter(u => u !== user);
    renderizarEspera();
    crearBox(user);
    setTimeout(() => iniciarConexion(user), 600);
}

// ── CAJAS DE VIDEO ──────────────────────────────────────────
function crearBox(nombre) {
    if (document.getElementById("box-" + nombre)) return;
    const box = document.createElement("div");
    box.className = "video-box"; box.id = "box-" + nombre;
    const v = document.createElement("video");
    v.id = "video-" + nombre; v.autoplay = true; v.playsinline = true;
    const s = document.createElement("span"); s.innerText = nombre;
    box.appendChild(v); box.appendChild(s);
    document.getElementById("salaVideos").appendChild(box);
}

// ── CÁMARA ──────────────────────────────────────────────────
function controlarCamaraLocal() {
    const btn = document.getElementById("btnCamara");
    if (miStream) {
        miStream.getTracks().forEach(t => t.stop());
        miStream = null;
        document.getElementById("localVideo").srcObject = null;
        btn.innerText = "Encender Cámara/Audio"; btn.style.background = "#28a745";
        Object.values(conexionesPeer).forEach(pc => {
            pc.getSenders().forEach(s => { if (s.track) pc.removeTrack(s); });
        });
        enviarSenal({ tipo: "camara_apagada", nombre: miNombre, destinatario: "" });
    } else {
        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(stream => {
                miStream = stream;
                const lv = document.getElementById("localVideo");
                lv.srcObject = stream; lv.style.transform = "scaleX(-1)";
                btn.innerText = "Apagar Cámara/Audio"; btn.style.background = "#dc3545";
                Object.entries(conexionesPeer).forEach(([remoto, pc]) => {
                    if (pc.signalingState !== "closed") {
                        stream.getTracks().forEach(t => {
                            if (!pc.getSenders().some(s => s.track && s.track.kind === t.kind))
                                pc.addTrack(t, stream);
                        });
                    }
                });
            })
            .catch(() => alert("Verifica los permisos de cámara en el navegador."));
    }
}

// ── WebRTC ──────────────────────────────────────────────────
function iniciarConexion(remoto) {
    if (conexionesPeer[remoto]) return;
    const pc = new RTCPeerConnection(rtcConfig);
    conexionesPeer[remoto] = pc;
    if (miStream) miStream.getTracks().forEach(t => pc.addTrack(t, miStream));
    pc.onicecandidate = e => {
        if (e.candidate)
            enviarSenal({ tipo: "candidate", nombre: miNombre, destinatario: remoto, candidate: e.candidate });
    };
    pc.ontrack = e => {
        const v = document.getElementById("video-" + remoto);
        if (v) v.srcObject = e.streams[0];
    };
    pc.createOffer()
        .then(o => pc.setLocalDescription(o))
        .then(() => enviarSenal({ tipo: "offer", nombre: miNombre, destinatario: remoto, sdp: pc.localDescription }))
        .catch(e => console.error("Error offer:", e));
}

function recibirOffer(remoto, sdp) {
    crearBox(remoto);
    if (!conexionesPeer[remoto]) {
        const pc = new RTCPeerConnection(rtcConfig);
        conexionesPeer[remoto] = pc;
        if (miStream) miStream.getTracks().forEach(t => pc.addTrack(t, miStream));
        pc.onicecandidate = e => {
            if (e.candidate)
                enviarSenal({ tipo: "candidate", nombre: miNombre, destinatario: remoto, candidate: e.candidate });
        };
        pc.ontrack = e => {
            const v = document.getElementById("video-" + remoto);
            if (v) v.srcObject = e.streams[0];
        };
    }
    const pc = conexionesPeer[remoto];
    pc.setRemoteDescription(new RTCSessionDescription(sdp))
        .then(() => pc.createAnswer())
        .then(a => pc.setLocalDescription(a))
        .then(() => enviarSenal({ tipo: "answer", nombre: miNombre, destinatario: remoto, sdp: pc.localDescription }))
        .catch(e => console.error("Error answer:", e));
}

// ── CHAT ────────────────────────────────────────────────────
function enviarMensaje() {
    const txt = document.getElementById("txtMensaje");
    const texto = txt.value.trim();
    if (!texto) return;
    enviarSenal({ tipo: "mensaje", nombre: miNombre, destinatario: "", mensaje: texto });
    mostrarMensaje(miNombre, texto);
    txt.value = ""; txt.focus();
}

function mostrarMensaje(nombre, texto) {
    const c = document.getElementById("mensajes");
    const p = document.createElement("p"); p.style.margin = "6px 0";
    const strong = document.createElement("strong");
    strong.style.color = nombre === miNombre ? "#ffc107" : "#0e71eb";
    strong.textContent = nombre + ": ";
    const span = document.createElement("span"); span.textContent = texto;
    p.appendChild(strong); p.appendChild(span);
    c.appendChild(p); c.scrollTop = c.scrollHeight;
}

// ── CERRAR SALA ──────────────────────────────────────────────
function cerrarSalaForzada() {
    enviarSenal({ tipo: "sala_cerrada", nombre: miNombre, destinatario: "" });
    setTimeout(() => { window.location.href = "index.html"; }, 400);
}

// ── ARRANCAR TODO ────────────────────────────────────────────
arrancarTemporizador();   // Temporizador corre desde el primer segundo
window.addEventListener("load", iniciar);  // Supabase arranca cuando la página cargó del todo
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Participante - ZoomOf</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #1a1a1a; color: #fff; }
        .barra-superior { background: #222; padding: 10px 20px; border-radius: 6px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #0e71eb; flex-wrap: wrap; gap: 8px; }
        #pantallaEspera { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20,20,20,0.96); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .cuadro-espera { background: #3a2e12; border: 2px solid #d39e00; padding: 30px; border-radius: 8px; text-align: center; max-width: 500px; }
        #interfazReunion { display: none; }
        .contenedor-principal { display: flex; gap: 20px; flex-wrap: wrap; }
        .seccion-chat { flex: 1; min-width: 220px; background: #2a2a2a; padding: 15px; border-radius: 8px; }
        #mensajes { height: 250px; border: 1px solid #444; overflow-y: auto; padding: 10px; background: #222; margin-bottom: 10px; }
        .seccion-videos { flex: 2; min-width: 280px; background: #2a2a2a; padding: 15px; border-radius: 8px; }
        .grid-videos { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        .video-box { position: relative; background: #222; border-radius: 6px; overflow: hidden; height: 180px; border: 2px solid #444; }
        video { width: 100%; height: 100%; object-fit: cover; background: #111; }
        .video-box span { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.6); padding: 2px 6px; font-size: 12px; border-radius: 3px; z-index: 10; }
        input[type="text"] { padding: 8px; background: #333; color: white; border: none; border-radius: 4px; }
        .estado { font-size: 12px; color: #888; margin-top: 5px; }
        .video-box { 
            position: relative; 
            background: #111111; 
            border-radius: 12px !important; 
            overflow: hidden; 
            border: 1px solid #333333 !important; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4); 
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .video-box:hover {
            border-color: #0e71eb !important; 
            transform: translateY(-2px);
        }
        .video-box span { 
            position: absolute; 
            bottom: 10px !important; 
            left: 10px !important; 
            background: rgba(15, 15, 15, 0.75) !important; 
            backdrop-filter: blur(4px); 
            padding: 4px 10px !important; 
            font-size: 12px; 
            font-weight: bold;
            border-radius: 6px !important; 
            z-index: 10; 
        }
        button, input[type="button"] {
            transition: filter 0.2s, transform 0.1s;
        }
        button:hover {
            filter: brightness(1.15); 
        }
        button:active {
            transform: scale(0.98); 
        }
        /* Animación para que el emoji suba y desaparezca de la pantalla */
        @keyframes flotarYDesvanecer {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            15% { opacity: 1; transform: translate(-50%, -70%) scale(1.2); }
            100% { transform: translate(-50%, -150%) scale(1); opacity: 0; }
        }

        .emoji-flotante {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 50px;
            z-index: 100;
            pointer-events: none;
            animation: flotarYDesvanecer 2s forwards ease-out;
        }

        .mano-icono {
    position: absolute !important;
    top: 10px !important;
    right: 10px !important;
    font-size: 16px !important; 
    background: rgba(0, 0, 0, 0.4) !important; 
    width: 32px !important;
    height: 32px !important;
    border-radius: 50% !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3) !important;
    z-index: 9999 !important;
    padding: 0 !important;
}
    </style>
</head>
<body>

<div id="pantallaEspera">
    <div class="cuadro-espera">
        <h2>⏳ Esperando que el anfitrión te permita ingresar...</h2>
        <p>Sala: <strong id="lblSalaEspera" style="color:#ffc107;"></strong></p>
        <p id="estadoEspera" style="color:#888;font-size:13px;">Conectando al servidor...</p>
    </div>
</div>

<div id="interfazReunion">
    <div class="barra-superior">
        <div>🔗 Sala: <span id="lblSalaID" style="color:#ffc107;"></span> | ROL: <strong>Participante</strong></div>
        <div>Usuario: <strong id="lblNombreBar" style="color:#0e71eb;"></strong></div>
        <button style="background:#dc3545;color:white;padding:6px 12px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;" onclick="abandonarSala()">Salir de la Reunión</button>
    </div>
     <div class="contenedor-principal">
        <div class="seccion-chat">
            <div id="mensajes"></div>
            
            <div style="display: flex; gap: 8px; margin-bottom: 8px; justify-content: center; background: #1f1f1f; padding: 5px; border-radius: 6px;">
                <button style="background: none; border: none; font-size: 20px; cursor: pointer;" onclick="enviarReaccion('👏')">👏</button>
                <button style="background: none; border: none; font-size: 20px; cursor: pointer;" onclick="enviarReaccion('❤️')">❤️</button>
                <button style="background: none; border: none; font-size: 20px; cursor: pointer;" onclick="enviarReaccion('😂')">😂</button>
                <button style="background: none; border: none; font-size: 20px; cursor: pointer;" onclick="enviarReaccion('😮')">😮</button>
                <button style="background: #ffc107; border: none; font-size: 13px; color: #000; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-weight: bold;" id="btnLevantarMano" onclick="alternarMano()">✋ Levantar Mano</button>
            </div>

            <div style="display:flex; gap:5px;">
                <input type="text" id="txtMensaje" placeholder="Escribe un mensaje..." style="width:100%;">
                <button style="background-color:#0e71eb; color:white; padding:6px 12px; border:none; border-radius:4px; cursor:pointer;" onclick="enviarMensaje()">Enviar</button>
            </div>
            <div id="estadoConexion" class="estado">📡 Conectado al servidor...</div>
        </div>
        <div class="seccion-videos">
            <button id="btnCamara" style="background:#28a745;color:white;margin-bottom:15px;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;" onclick="controlarCamaraLocal()">Encender Cámara/Audio</button>
            <div class="grid-videos" id="salaVideos">
                <div class="video-box" id="box-local">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <span id="lblNombreLocal">Tú (Participante)</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
const params   = new URLSearchParams(window.location.search);
const salaID   = decodeURIComponent(params.get("id")     || "");
const miNombre = decodeURIComponent(params.get("nombre") || "Participante");

if (!salaID) { window.location.href = "index.html"; }

// ID del anfitrión (mismo formato que usa crearreunion.html)
const peerIdAnfitrion = "zoomof-" + salaID.replace(/[^a-zA-Z0-9]/g, "-");

document.getElementById("lblSalaEspera").textContent  = salaID;
document.getElementById("lblSalaID").textContent      = salaID;
document.getElementById("lblNombreBar").textContent   = miNombre;
document.getElementById("lblNombreLocal").textContent = "Tú (Participante) - " + miNombre;
document.title = "Participante - " + salaID;

let peer     = null;
let connData = null;   // DataConnection con el anfitrión
let callVid  = null;   // MediaConnection con el anfitrión
let miStream = null;
let admitido = false;
let ultimoStreamAnfitrion = null;

// ── INICIAR ───────────────────────────────────────────────────
window.addEventListener("load", () => {
 
    const miPeerId = "zoomof-part-" + Date.now() + "-" + Math.floor(Math.random() * 9999);
    peer = new Peer(miPeerId);

    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
            miStream = stream; 
            
            miStream.getVideoTracks().forEach(track => track.enabled = false);
            miStream.getAudioTracks().forEach(track => track.enabled = false);
            
            const lv = document.getElementById("localVideo");
            if (lv) {
                lv.srcObject = stream;
                lv.style.transform = "scaleX(-1)";
            }
        })
        .catch(err => {
            console.error("No se pudo inicializar la cámara al cargar: ", err);
        });

    peer.on("open", () => {
        document.getElementById("estadoEspera").innerText = "✔ Conectado. Llamando al anfitrión...";
        document.getElementById("estadoEspera").style.color = "#28a745";
        conectarConAnfitrion();
    });

    peer.on("error", (err) => {
        console.error("Error PeerJS:", err);
    });
});
// ── CONECTAR CON ANFITRIÓN ────────────────────────────────────
function conectarConAnfitrion() {
    // 1. Abrir canal de datos (señalización + chat)
    connData = peer.connect(peerIdAnfitrion, {
        metadata: { nombre: miNombre },
        reliable: true
    });

    connData.on("open", () => {
        console.log("✅ Canal de datos abierto con el anfitrión");
        document.getElementById("estadoEspera").innerText = "⏳ Esperando que el anfitrión te admita...";
    });

    connData.on("data", (data) => {
        if (!data || !data.tipo) return;
        switch (data.tipo) {
            case "entrada_aprobada":
                admitido = true;
                activarSala();
                iniciarLlamadaVideo();
                break;
            case "sala_cerrada":
                window.location.href = "index.html";
                break;
            case "mensaje":
                if (admitido) mostrarMensaje(data.nombre, data.mensaje);
                break;
            case "camara_apagada": 
                const v = document.getElementById("video-anfitrion");
                if (v) v.srcObject = null;
                break;
            case "camara_encendida":
                    const vEncendido = document.getElementById("video-anfitrion");
                    if (vEncendido && ultimoStreamAnfitrion) {
                        vEncendido.srcObject = ultimoStreamAnfitrion;
                    }
                    break;
            case "reaccion":
                mostrarEmojiEnPantalla("box-anfitrion", data.emoji);
                break;
            case "mano_estado":
                dibujarManoEnVideo("box-anfitrion", data.estado);
                break;    
        }
    });

    connData.on("close", () => {
        if (admitido) {
            mostrarMensaje("Sistema", "El anfitrión se desconectó.");
        } else {
            document.getElementById("estadoEspera").innerText = "❌ El anfitrión cerró la sala.";
        }
    });

    connData.on("error", (err) => {
        console.error("Error canal datos:", err);
        document.getElementById("estadoEspera").innerText = "❌ No se encontró la sala. Verifica el ID.";
        document.getElementById("estadoEspera").style.color = "#dc3545";
    });
}

// ── LLAMADA DE VIDEO ──────────────────────────────────────────

function iniciarLlamadaVideo() {

    crearBox("anfitrion");

    callVid = peer.call(peerIdAnfitrion, miStream || new MediaStream(), {
        metadata: { nombre: miNombre }
    });

    callVid.on("stream", (remoteStream) => {
        ultimoStreamAnfitrion = remoteStream; 
        const v = document.getElementById("video-anfitrion");
        if (v) {
            v.srcObject = remoteStream;
            v.play().catch(e => console.log("Error auto-play anfitrión: ", e));
        }
    });

    callVid.on("close", () => {
        const el = document.getElementById("box-anfitrion");
        if (el) el.remove();
    });
}

// ── ACTIVAR SALA ──────────────────────────────────────────────
function activarSala() {
    document.getElementById("pantallaEspera").style.display = "none";
    document.getElementById("interfazReunion").style.display = "block";
    document.getElementById("txtMensaje").addEventListener("keypress", e => {
        if (e.key === "Enter") enviarMensaje();
    });
}

// ── CAJAS DE VIDEO ────────────────────────────────────────────
function crearBox(nombre) {
    if (document.getElementById("box-" + nombre)) return;
    const box = document.createElement("div");
    box.className = "video-box"; box.id = "box-" + nombre;
    const v = document.createElement("video");
    v.id = "video-" + nombre; v.autoplay = true; v.playsinline = true;
    const s = document.createElement("span");
    s.innerText = nombre === "anfitrion" ? "Anfitrión" : nombre;
    box.appendChild(v); box.appendChild(s);
    document.getElementById("salaVideos").appendChild(box);
}

// ── CÁMARA ────────────────────────────────────────────────────
function controlarCamaraLocal() {
    const btn = document.getElementById("btnCamara");

    if (miStream) {
        miStream.getTracks().forEach(track => track.stop());

        miStream = null;

        document.getElementById("localVideo").srcObject = null;

        btn.innerText = "Encender Cámara/Audio";
        btn.style.background = "#28a745";

        if (connData && connData.open) {
            connData.send({ tipo: "camara_apagada" });
        }

        return;
    }

    navigator.mediaDevices.getUserMedia({
        video: true,
        audio: true
    })
    .then(stream => {

        miStream = stream;

        const lv = document.getElementById("localVideo");
        lv.srcObject = stream;
        lv.style.transform = "scaleX(-1)";

        btn.innerText = "Apagar Cámara/Audio";
        btn.style.background = "#dc3545";

        if (callVid) {
            callVid.close();
        }

        callVid = peer.call(peerIdAnfitrion, miStream, {
            metadata: {
                nombre: miNombre
            }
        });

        callVid.on("stream", remoteStream => {

            crearBox("anfitrion");

            const videoHost =
                document.getElementById("video-anfitrion");

            if (videoHost) {
                videoHost.srcObject = remoteStream;
            }
        });

    })
    .catch(err => {
        console.error(err);
        alert("No se pudo acceder a la cámara.");
    });
}
// ── CHAT ──────────────────────────────────────────────────────
function enviarMensaje() {
    const txt = document.getElementById("txtMensaje");
    const texto = txt.value.trim();
    if (!texto || !connData || !connData.open) return;
    connData.send({ tipo: "mensaje", nombre: miNombre, mensaje: texto });
    mostrarMensaje(miNombre, texto);
    txt.value = ""; txt.focus();
}

function mostrarMensaje(nombre, texto) {
    const c = document.getElementById("mensajes");
    const p = document.createElement("p"); p.style.margin = "5px 0";
    const strong = document.createElement("strong");
    strong.style.color = nombre === miNombre ? "#ffc107" : "#0e71eb";
    strong.textContent = nombre + ": ";
    const span = document.createElement("span"); span.textContent = texto;
    p.appendChild(strong); p.appendChild(span);
    c.appendChild(p); c.scrollTop = c.scrollHeight;
}

// ====== LOGICA DE REACCIONES Y MANO LEVANTADA (PARTICIPANTE) ======

function enviarReaccion(emoji) {
    mostrarEmojiEnPantalla("box-local", emoji);

    if (typeof connData !== "undefined" && connData.open) {
        connData.send({
            tipo: "reaccion",
            de: miNombre, 
            emoji: emoji
        });
    }
}

function alternarMano() {
    const btn = document.getElementById("btnLevantarMano");
    if (!btn) return;

    const yaLevanto = btn.classList.toggle("mano-activa");

    const datosMano = { tipo: "mano_estado", de: miNombre, estado: yaLevanto };

    if (typeof connData !== "undefined" && connData.open) {
        connData.send(datosMano);
    }

    if (yaLevanto) {
        btn.innerText = "👇 Bajar Mano";
        btn.style.background = "#dc3545";
        btn.style.color = "white";
        dibujarManoEnVideo("box-local", true);
    } else {
        btn.innerText = "✋ Levantar Mano";
        btn.style.background = "#ffc107";
        btn.style.color = "#000";
        dibujarManoEnVideo("box-local", false);
    }
}

function mostrarEmojiEnPantalla(idContenedor, emoji) {
    let contenedor = document.getElementById(idContenedor) || document.getElementById(idContenedor.replace("box-", ""));
    if (!contenedor) return;

    const divEmoji = document.createElement("div");
    divEmoji.className = "emoji-flotante";
    divEmoji.innerText = emoji;

    contenedor.appendChild(divEmoji);
    setTimeout(() => { divEmoji.remove(); }, 2000);
}

function dibujarManoEnVideo(idContenedor, mostrar) {
    let contenedor = document.getElementById(idContenedor) || document.getElementById(idContenedor.replace("box-", ""));
    if (!contenedor) return;

    let manoExistente = contenedor.querySelector(".mano-icono");

    if (mostrar) {
        if (!manoExistente) {
            const spanMano = document.createElement("span");
            spanMano.className = "mano-icono";
            spanMano.innerText = "✋";
            contenedor.appendChild(spanMano);
        }
    } else {
        if (manoExistente) manoExistente.remove();
    }
}
    
// ── SALIR ─────────────────────────────────────────────────────
function abandonarSala() {
    if (peer) peer.destroy();
    window.location.href = "index.html";
}
</script>
</body>
</html>

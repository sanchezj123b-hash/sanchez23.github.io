<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Participante - ZoomOf</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #1a1a1a; color: #fff; }
        .barra-superior { background: #222; padding: 10px 20px; border-radius: 6px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #0e71eb; flex-wrap: wrap; gap: 8px; }
        #pantallaEspera { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20,20,20,0.96); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .cuadro-espera { background: #3a2e12; border: 2px solid #d39e00; padding: 30px; border-radius: 8px; text-align: center; max-width: 500px; }
        #interfazReunion { display: none; }
        .contenedor-principal { display: flex; gap: 20px; flex-wrap: wrap; }
        .seccion-chat { flex: 1; min-width: 220px; background: #2a2a2a; padding: 15px; border-radius: 8px; }
        #mensajes { height: 250px; border: 1px solid #444; overflow-y: auto; padding: 10px; background: #222; margin-bottom: 10px; }
        .seccion-videos { flex: 2; min-width: 280px; background: #2a2a2a; padding: 15px; border-radius: 8px; }
        .grid-videos { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        .video-box { position: relative; background: #222; border-radius: 6px; overflow: hidden; height: 180px; border: 2px solid #444; }
        video { width: 100%; height: 100%; object-fit: cover; background: #111; }
        .video-box span { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.6); padding: 2px 6px; font-size: 12px; border-radius: 3px; z-index: 10; }
        input[type="text"] { padding: 8px; background: #333; color: white; border: none; border-radius: 4px; }
        .estado { font-size: 12px; color: #888; margin-top: 5px; }
        .video-box { 
            position: relative; 
            background: #111111; 
            border-radius: 12px !important; 
            overflow: hidden; 
            border: 1px solid #333333 !important; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4); 
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .video-box:hover {
            border-color: #0e71eb !important; 
            transform: translateY(-2px);
        }
        .video-box span { 
            position: absolute; 
            bottom: 10px !important; 
            left: 10px !important; 
            background: rgba(15, 15, 15, 0.75) !important; 
            backdrop-filter: blur(4px); 
            padding: 4px 10px !important; 
            font-size: 12px; 
            font-weight: bold;
            border-radius: 6px !important; 
            z-index: 10; 
        }
        button, input[type="button"] {
            transition: filter 0.2s, transform 0.1s;
        }
        button:hover {
            filter: brightness(1.15); 
        }
        button:active {
            transform: scale(0.98); 
        }
        /* Animación para que el emoji suba y desaparezca de la pantalla */
        @keyframes flotarYDesvanecer {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            15% { opacity: 1; transform: translate(-50%, -70%) scale(1.2); }
            100% { transform: translate(-50%, -150%) scale(1); opacity: 0; }
        }

        .emoji-flotante {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 50px;
            z-index: 100;
            pointer-events: none;
            animation: flotarYDesvanecer 2s forwards ease-out;
        }

        .mano-icono {
    position: absolute !important;
    top: 10px !important;
    right: 10px !important;
    font-size: 16px !important; 
    background: rgba(0, 0, 0, 0.4) !important; 
    width: 32px !important;
    height: 32px !important;
    border-radius: 50% !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3) !important;
    z-index: 9999 !important;
    padding: 0 !important;
}

        /* Barra de controles de video */
        .barra-controles {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
            align-items: center;
        }
        .btn-control {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: white;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Video fijado: ocupa todo el ancho encima del grid */
        .video-box.fijado {
            grid-column: 1 / -1;
            height: 360px !important;
            border-color: #ffc107 !important;
            order: -1;
        }
        .video-box.fijado::after {
            content: "📌 Fijado";
            position: absolute;
            top: 8px;
            right: 10px;
            background: rgba(255,193,7,0.85);
            color: #000;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            z-index: 20;
        }

        /* Ícono de mic silenciado sobre la caja de video */
        .mic-off-icono {
            position: absolute !important;
            bottom: 10px !important;
            right: 10px !important;
            font-size: 14px !important;
            background: rgba(220,53,69,0.85) !important;
            width: 28px !important;
            height: 28px !important;
            border-radius: 50% !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            z-index: 9999 !important;
            padding: 0 !important;
        }
    </style>
</head>
<body>

<div id="pantallaEspera">
    <div class="cuadro-espera">
        <h2>⏳ Esperando que el anfitrión te permita ingresar...</h2>
        <p>Sala: <strong id="lblSalaEspera" style="color:#ffc107;"></strong></p>
        <p id="estadoEspera" style="color:#888;font-size:13px;">Conectando al servidor...</p>
    </div>
</div>

<div id="interfazReunion">
    <div class="barra-superior">
        <div>🔗 Sala: <span id="lblSalaID" style="color:#ffc107;"></span> | ROL: <strong>Participante</strong></div>
        <div>Usuario: <strong id="lblNombreBar" style="color:#0e71eb;"></strong></div>
        <button style="background:#dc3545;color:white;padding:6px 12px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;" onclick="abandonarSala()">Salir de la Reunión</button>
    </div>
     <div class="contenedor-principal">
        <div class="seccion-chat">
            <div id="mensajes"></div>
            
            <div style="display: flex; gap: 8px; margin-bottom: 8px; justify-content: center; background: #1f1f1f; padding: 5px; border-radius: 6px;">
                <button style="background: none; border: none; font-size: 20px; cursor: pointer;" onclick="enviarReaccion('👏')">👏</button>
                <button style="background: none; border: none; font-size: 20px; cursor: pointer;" onclick="enviarReaccion('❤️')">❤️</button>
                <button style="background: none; border: none; font-size: 20px; cursor: pointer;" onclick="enviarReaccion('😂')">😂</button>
                <button style="background: none; border: none; font-size: 20px; cursor: pointer;" onclick="enviarReaccion('😮')">😮</button>
                <button style="background: #ffc107; border: none; font-size: 13px; color: #000; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-weight: bold;" id="btnLevantarMano" onclick="alternarMano()">✋ Levantar Mano</button>
            </div>

            <div style="display:flex; gap:5px;">
                <input type="text" id="txtMensaje" placeholder="Escribe un mensaje..." style="width:100%;">
                <button style="background-color:#0e71eb; color:white; padding:6px 12px; border:none; border-radius:4px; cursor:pointer;" onclick="enviarMensaje()">Enviar</button>
            </div>
            <div id="estadoConexion" class="estado">📡 Conectado al servidor...</div>
        </div>
        <div class="seccion-videos">
            <div class="barra-controles">
                <button id="btnCamara" class="btn-control" style="background:#6c757d;" onclick="controlarCamaraLocal()">📹 Cámara</button>
                <button id="btnMic" class="btn-control" style="background:#6c757d;" onclick="alternarMicrofono()">🔇 Micrófono</button>
                <button id="btnPantalla" class="btn-control" style="background:#6f42c1;" onclick="alternarPantalla()">🖥️ Compartir Pantalla</button>
                <button id="btnCompartir" class="btn-control" style="background:#17a2b8;" onclick="compartirLlamada()">🔗 Compartir Llamada</button>
                <button id="btnFijar" class="btn-control" style="background:#fd7e14;" onclick="fijarCamara()" disabled>📌 Fijar Cámara</button>
            </div>
            <div class="grid-videos" id="salaVideos">
                <div class="video-box" id="box-local">
                    <video id="localVideo" autoplay playsinline muted></video>
                    <span id="lblNombreLocal">Tú (Participante)</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
const params   = new URLSearchParams(window.location.search);
const salaID   = decodeURIComponent(params.get("id")     || "");
const miNombre = decodeURIComponent(params.get("nombre") || "Participante");

if (!salaID) { window.location.href = "index.html"; }

// ID del anfitrión (mismo formato que usa crearreunion.html)
const peerIdAnfitrion = "zoomof-" + salaID.replace(/[^a-zA-Z0-9]/g, "-");

document.getElementById("lblSalaEspera").textContent  = salaID;
document.getElementById("lblSalaID").textContent      = salaID;
document.getElementById("lblNombreBar").textContent   = miNombre;
document.getElementById("lblNombreLocal").textContent = "Tú (Participante) - " + miNombre;
document.title = "Participante - " + salaID;

let peer     = null;
let connData = null;   // DataConnection con el anfitrión
let callVid  = null;   // MediaConnection con el anfitrión
let miStream = null;
let miVideoTrack = null;  // track de video activo (independiente)
let miAudioTrack = null;  // track de audio activo (independiente)
let admitido = false;
let ultimoStreamAnfitrion = null;

// ── INICIAR ───────────────────────────────────────────────────
window.addEventListener("load", () => {
 
    const miPeerId = "zoomof-part-" + Date.now() + "-" + Math.floor(Math.random() * 9999);
    peer = new Peer(miPeerId);

    // No pedimos ningún track al inicio: el usuario los activa con los botones
    // Esto evita que tracks "pre-pedidos" queden en estado inconsistente

    peer.on("open", () => {
        document.getElementById("estadoEspera").innerText = "✔ Conectado. Llamando al anfitrión...";
        document.getElementById("estadoEspera").style.color = "#28a745";
        conectarConAnfitrion();
    });

    peer.on("error", (err) => {
        console.error("Error PeerJS:", err);
    });
});
// ── CONECTAR CON ANFITRIÓN ────────────────────────────────────
function conectarConAnfitrion() {
    // 1. Abrir canal de datos (señalización + chat)
    connData = peer.connect(peerIdAnfitrion, {
        metadata: { nombre: miNombre },
        reliable: true
    });

    connData.on("open", () => {
        console.log("✅ Canal de datos abierto con el anfitrión");
        document.getElementById("estadoEspera").innerText = "⏳ Esperando que el anfitrión te admita...";
    });

    connData.on("data", (data) => {
        if (!data || !data.tipo) return;
        switch (data.tipo) {
            case "entrada_aprobada":
                admitido = true;
                activarSala();
                iniciarLlamadaVideo();
                break;
            case "sala_cerrada":
                window.location.href = "index.html";
                break;
            case "mensaje":
                if (admitido) mostrarMensaje(data.nombre, data.mensaje);
                break;
            case "camara_apagada": 
                const v = document.getElementById("video-anfitrion");
                if (v) v.srcObject = null;
                break;
            case "camara_encendida":
                    const vEncendido = document.getElementById("video-anfitrion");
                    if (vEncendido && ultimoStreamAnfitrion) {
                        vEncendido.srcObject = ultimoStreamAnfitrion;
                    }
                    break;
            case "reaccion":
                mostrarEmojiEnPantalla("box-anfitrion", data.emoji);
                break;
            case "mano_estado":
                dibujarManoEnVideo("box-anfitrion", data.estado);
                break;    
        }
    });

    connData.on("close", () => {
        if (admitido) {
            mostrarMensaje("Sistema", "El anfitrión se desconectó.");
        } else {
            document.getElementById("estadoEspera").innerText = "❌ El anfitrión cerró la sala.";
        }
    });

    connData.on("error", (err) => {
        console.error("Error canal datos:", err);
        document.getElementById("estadoEspera").innerText = "❌ No se encontró la sala. Verifica el ID.";
        document.getElementById("estadoEspera").style.color = "#dc3545";
    });
}

// ── LLAMADA DE VIDEO ──────────────────────────────────────────
function iniciarLlamadaVideo() {
    crearBox("anfitrion");

    // Si el stream no está listo todavía (getUserMedia aún no terminó),
    // esperar hasta 3 segundos antes de llamar con lo que haya
    const hacerLlamada = (streamParaLlamar) => {
        callVid = peer.call(peerIdAnfitrion, streamParaLlamar, {
            metadata: { nombre: miNombre }
        });

        callVid.on("stream", (remoteStream) => {
            ultimoStreamAnfitrion = remoteStream;
            const v = document.getElementById("video-anfitrion");
            if (v) {
                v.srcObject = remoteStream;
                v.play().catch(e => console.log("Error auto-play anfitrión:", e));
            }
        });

        callVid.on("close", () => {
            const el = document.getElementById("box-anfitrion");
            if (el) el.remove();
        });
    };

    if (miStream) {
        // Stream ya listo → llamar de inmediato
        hacerLlamada(miStream);
    } else {
        // Stream aún no disponible → esperar hasta 3 seg con reintentos cada 100ms
        let intentos = 0;
        const esperar = setInterval(() => {
            intentos++;
            if (miStream) {
                clearInterval(esperar);
                hacerLlamada(miStream);
            } else if (intentos >= 30) {
                // Después de 3 seg sin stream, llamar con MediaStream vacío igual
                clearInterval(esperar);
                hacerLlamada(new MediaStream());
            }
        }, 100);
    }
}

// ── ACTIVAR SALA ──────────────────────────────────────────────
function activarSala() {
    document.getElementById("pantallaEspera").style.display = "none";
    document.getElementById("interfazReunion").style.display = "block";
    document.getElementById("txtMensaje").addEventListener("keypress", e => {
        if (e.key === "Enter") enviarMensaje();
    });
}

// ── CAJAS DE VIDEO ────────────────────────────────────────────
function crearBox(nombre) {
    if (document.getElementById("box-" + nombre)) return;
    const box = document.createElement("div");
    box.className = "video-box"; box.id = "box-" + nombre;
    const v = document.createElement("video");
    v.id = "video-" + nombre; v.autoplay = true; v.playsinline = true;
    const s = document.createElement("span");
    s.innerText = nombre === "anfitrion" ? "Anfitrión" : nombre;
    box.appendChild(v); box.appendChild(s);
    document.getElementById("salaVideos").appendChild(box);
}

// ── CÁMARA ────────────────────────────────────────────────────
function actualizarBtnCamara(activa) {
    const btn = document.getElementById("btnCamara");
    if (activa) {
        btn.innerText = "📹 Cámara (ON)";
        btn.style.background = "#28a745";
    } else {
        btn.innerText = "📹 Cámara (OFF)";
        btn.style.background = "#6c757d";
    }
}

function controlarCamaraLocal() {
    // ── APAGAR: track existe, está vivo y activo ──
    if (miVideoTrack && miVideoTrack.readyState === "live" && miVideoTrack.enabled) {
        miVideoTrack.enabled = false;
        const lv = document.getElementById("localVideo");
        if (lv) lv.srcObject = null;
        actualizarBtnCamara(false);
        if (connData && connData.open) connData.send({ tipo: "camara_apagada" });
        return;
    }

    // ── ENCENDER: pedir track nuevo siempre ──
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(videoStream => {
        const nuevoTrack = videoStream.getVideoTracks()[0];

        if (miVideoTrack) { miVideoTrack.stop(); }
        miVideoTrack = nuevoTrack;

        // Mostrar en video local con stream propio (no mezclar con la llamada)
        const lv = document.getElementById("localVideo");
        if (lv) { lv.srcObject = videoStream; lv.style.transform = "scaleX(-1)"; }

        actualizarBtnCamara(true);
        document.getElementById("btnFijar").disabled = false;

        // Inyectar en la llamada existente sin tocar el audio
        if (callVid && callVid.peerConnection) {
            try {
                const senders = callVid.peerConnection.getSenders();
                const sv = senders.find(s => s.track?.kind === "video");
                if (sv) {
                    sv.replaceTrack(nuevoTrack);
                } else {
                    callVid.peerConnection.addTrack(nuevoTrack, new MediaStream([nuevoTrack]));
                }
                if (connData && connData.open) connData.send({ tipo: "camara_encendida" });
                return;
            } catch (e) {
                console.warn("replaceTrack video falló, reconectando:", e);
                callVid.close(); callVid = null;
            }
        }

        // Si no hay llamada activa: iniciar una nueva con los tracks disponibles
        const tracks = [];
        if (nuevoTrack) tracks.push(nuevoTrack);
        if (miAudioTrack && miAudioTrack.readyState === "live") tracks.push(miAudioTrack);
        const streamLlamada = new MediaStream(tracks);
        callVid = peer.call(peerIdAnfitrion, streamLlamada, { metadata: { nombre: miNombre } });
        crearBox("anfitrion");
        callVid.on("stream", remoteStream => {
            ultimoStreamAnfitrion = remoteStream;
            const v = document.getElementById("video-anfitrion");
            if (v) { v.srcObject = remoteStream; v.play().catch(()=>{}); }
        });
        callVid.on("close", () => { document.getElementById("box-anfitrion")?.remove(); });
        if (connData && connData.open) connData.send({ tipo: "camara_encendida" });
    })
    .catch(err => { console.error(err); alert("No se pudo acceder a la cámara."); });
}

// ── MICRÓFONO ─────────────────────────────────────────────────
function actualizarBtnMic(activo) {
    const btn = document.getElementById("btnMic");
    if (activo) {
        btn.innerText = "🎙️ Micrófono (ON)";
        btn.style.background = "#28a745";
        const micIcon = document.querySelector("#box-local .mic-off-icono");
        if (micIcon) micIcon.remove();
    } else {
        btn.innerText = "🔇 Micrófono (OFF)";
        btn.style.background = "#dc3545";
        const box = document.getElementById("box-local");
        if (box && !box.querySelector(".mic-off-icono")) {
            const icon = document.createElement("span");
            icon.className = "mic-off-icono";
            icon.innerText = "🔇";
            box.appendChild(icon);
        }
    }
}

function alternarMicrofono() {
    // ── Si el track existe y está vivo: mute/unmute directo ──
    if (miAudioTrack && miAudioTrack.readyState === "live") {
        miAudioTrack.enabled = !miAudioTrack.enabled;
        actualizarBtnMic(miAudioTrack.enabled);
        return;
    }

    // ── Sin track o track muerto: pedir uno nuevo ──
    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(audioStream => {
        const nuevoTrack = audioStream.getAudioTracks()[0];
        if (miAudioTrack) { miAudioTrack.stop(); }
        miAudioTrack = nuevoTrack;
        actualizarBtnMic(true);

        if (callVid && callVid.peerConnection) {
            try {
                const senders = callVid.peerConnection.getSenders();
                const sa = senders.find(s => s.track?.kind === "audio");
                if (sa) {
                    sa.replaceTrack(nuevoTrack);
                } else {
                    callVid.peerConnection.addTrack(nuevoTrack, new MediaStream([nuevoTrack]));
                }
                return;
            } catch(e) { console.warn("replaceTrack audio falló:", e); }
        }

        // Sin llamada activa: iniciar con lo que hay
        const tracks = [nuevoTrack];
        if (miVideoTrack && miVideoTrack.readyState === "live") tracks.push(miVideoTrack);
        const streamLlamada = new MediaStream(tracks);
        callVid = peer.call(peerIdAnfitrion, streamLlamada, { metadata: { nombre: miNombre } });
        crearBox("anfitrion");
        callVid.on("stream", remoteStream => {
            ultimoStreamAnfitrion = remoteStream;
            const v = document.getElementById("video-anfitrion");
            if (v) { v.srcObject = remoteStream; v.play().catch(()=>{}); }
        });
        callVid.on("close", () => { document.getElementById("box-anfitrion")?.remove(); });
    })
    .catch(err => { console.error(err); alert("Verifica permisos de micrófono."); });
}

// ── COMPARTIR LLAMADA ─────────────────────────────────────────
function compartirLlamada() {
    const btn = document.getElementById("btnCompartir");
    const url = window.location.origin + window.location.pathname.replace("unirsereunion.html", "index.html");
    const texto = "ID de la reunión: " + salaID + "\nÚnete en: " + url;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(texto).then(() => {
            const original = btn.innerText;
            btn.innerText = "✅ ¡Copiado!";
            btn.style.background = "#28a745";
            setTimeout(() => { btn.innerText = "🔗 Compartir Llamada"; btn.style.background = "#17a2b8"; }, 2000);
        }).catch(() => mostrarModalCompartir(texto));
    } else {
        mostrarModalCompartir(texto);
    }
}
function mostrarModalCompartir(texto) {
    const id = "modalCompartir";
    if (document.getElementById(id)) return;
    const overlay = document.createElement("div");
    overlay.id = id;
    overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;";
    const box = document.createElement("div");
    box.style.cssText = "background:#2a2a2a;border:1px solid #555;border-radius:10px;padding:25px;max-width:420px;width:90%;text-align:center;";
    box.innerHTML = `<h3 style="margin-top:0;color:#ffc107;">🔗 Compartir Reunión</h3>
        <p style="color:#ccc;font-size:13px;">Comparte este ID con los participantes:</p>
        <div style="background:#111;border:1px solid #444;border-radius:6px;padding:12px;margin:10px 0;font-size:15px;color:#ffc107;font-weight:bold;letter-spacing:1px;">${salaID}</div>
        <textarea readonly style="width:100%;background:#111;color:#aaa;border:1px solid #444;border-radius:6px;padding:8px;font-size:12px;resize:none;box-sizing:border-box;" rows="3">${texto}</textarea>
        <button onclick="document.getElementById('${id}').remove()" style="margin-top:12px;background:#dc3545;color:white;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-weight:bold;">Cerrar</button>`;
    overlay.appendChild(box);
    document.body.appendChild(overlay);
}
function enviarMensaje() {
    const txt = document.getElementById("txtMensaje");
    const texto = txt.value.trim();
    if (!texto || !connData || !connData.open) return;
    connData.send({ tipo: "mensaje", nombre: miNombre, mensaje: texto });
    mostrarMensaje(miNombre, texto);
    txt.value = ""; txt.focus();
}

function mostrarMensaje(nombre, texto) {
    const c = document.getElementById("mensajes");
    const p = document.createElement("p"); p.style.margin = "5px 0";
    const strong = document.createElement("strong");
    strong.style.color = nombre === miNombre ? "#ffc107" : "#0e71eb";
    strong.textContent = nombre + ": ";
    const span = document.createElement("span"); span.textContent = texto;
    p.appendChild(strong); p.appendChild(span);
    c.appendChild(p); c.scrollTop = c.scrollHeight;
}

// ====== LOGICA DE REACCIONES Y MANO LEVANTADA (PARTICIPANTE) ======

function enviarReaccion(emoji) {
    mostrarEmojiEnPantalla("box-local", emoji);

    if (typeof connData !== "undefined" && connData.open) {
        connData.send({
            tipo: "reaccion",
            de: miNombre, 
            emoji: emoji
        });
    }
}

function alternarMano() {
    const btn = document.getElementById("btnLevantarMano");
    if (!btn) return;

    const yaLevanto = btn.classList.toggle("mano-activa");

    const datosMano = { tipo: "mano_estado", de: miNombre, estado: yaLevanto };

    if (typeof connData !== "undefined" && connData.open) {
        connData.send(datosMano);
    }

    if (yaLevanto) {
        btn.innerText = "👇 Bajar Mano";
        btn.style.background = "#dc3545";
        btn.style.color = "white";
        dibujarManoEnVideo("box-local", true);
    } else {
        btn.innerText = "✋ Levantar Mano";
        btn.style.background = "#ffc107";
        btn.style.color = "#000";
        dibujarManoEnVideo("box-local", false);
    }
}

function mostrarEmojiEnPantalla(idContenedor, emoji) {
    let contenedor = document.getElementById(idContenedor) || document.getElementById(idContenedor.replace("box-", ""));
    if (!contenedor) return;

    const divEmoji = document.createElement("div");
    divEmoji.className = "emoji-flotante";
    divEmoji.innerText = emoji;

    contenedor.appendChild(divEmoji);
    setTimeout(() => { divEmoji.remove(); }, 2000);
}

function dibujarManoEnVideo(idContenedor, mostrar) {
    let contenedor = document.getElementById(idContenedor) || document.getElementById(idContenedor.replace("box-", ""));
    if (!contenedor) return;

    let manoExistente = contenedor.querySelector(".mano-icono");

    if (mostrar) {
        if (!manoExistente) {
            const spanMano = document.createElement("span");
            spanMano.className = "mano-icono";
            spanMano.innerText = "✋";
            contenedor.appendChild(spanMano);
        }
    } else {
        if (manoExistente) manoExistente.remove();
    }
}
    
// ── SALIR ─────────────────────────────────────────────────────
function abandonarSala() {
    if (streamPantalla) detenerPantalla();
    if (peer) peer.destroy();
    window.location.href = "index.html";
}

// ── FIJAR CÁMARA ──────────────────────────────────────────────
let camaraFijadaId = null;

function fijarCamara() {
    const btn = document.getElementById("btnFijar");

    // Si ya hay una fijada → desfijar
    if (camaraFijadaId) {
        const boxAnterior = document.getElementById(camaraFijadaId);
        if (boxAnterior) boxAnterior.classList.remove("fijado");
        camaraFijadaId = null;
        btn.innerText = "📌 Fijar Cámara";
        btn.style.background = "#fd7e14";
        return;
    }

    // Pedir al usuario qué cámara fijar con un menú simple
    const boxes = document.querySelectorAll(".video-box");
    if (boxes.length === 0) return;

    // Si solo hay una caja distinta de local, fijarla directamente
    const opciones = Array.from(boxes).filter(b => b.id !== "box-local");
    if (opciones.length === 1) {
        opciones[0].classList.add("fijado");
        camaraFijadaId = opciones[0].id;
        btn.innerText = "📌 Desfijar";
        btn.style.background = "#dc3545";
        return;
    }

    // Si hay varias: fijar la propia cámara local
    const boxLocal = document.getElementById("box-local");
    if (boxLocal) {
        boxLocal.classList.add("fijado");
        camaraFijadaId = "box-local";
        btn.innerText = "📌 Desfijar";
        btn.style.background = "#dc3545";
    }
}

// También permitir fijar haciendo doble clic sobre cualquier caja de video
document.addEventListener("dblclick", (e) => {
    const box = e.target.closest(".video-box");
    if (!box) return;

    const btn = document.getElementById("btnFijar");

    // Si la caja clicada ya está fijada → desfijar
    if (box.classList.contains("fijado")) {
        box.classList.remove("fijado");
        camaraFijadaId = null;
        if (btn) { btn.innerText = "📌 Fijar Cámara"; btn.style.background = "#fd7e14"; }
        return;
    }

    // Desfijar la anterior si existe
    if (camaraFijadaId) {
        const anterior = document.getElementById(camaraFijadaId);
        if (anterior) anterior.classList.remove("fijado");
    }

    box.classList.add("fijado");
    camaraFijadaId = box.id;
    if (btn) { btn.innerText = "📌 Desfijar"; btn.style.background = "#dc3545"; }
});

// ── COMPARTIR PANTALLA ────────────────────────────────────────
let streamPantalla = null;
let callPantalla   = null;

async function alternarPantalla() {
    const btn = document.getElementById("btnPantalla");

    // Si ya está compartiendo → detener
    if (streamPantalla) {
        detenerPantalla();
        return;
    }

    try {
        streamPantalla = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });

        // Mostrar la pantalla en una caja propia
        crearBox("pantalla-local");
        const vBox = document.getElementById("video-pantalla-local");
        if (vBox) {
            vBox.srcObject = streamPantalla;
            // Cambiar etiqueta
            const lbl = document.querySelector("#box-pantalla-local span");
            if (lbl) lbl.innerText = "🖥️ Tu Pantalla";
        }

        // Enviar la pantalla al anfitrión como una llamada separada
        callPantalla = peer.call(peerIdAnfitrion, streamPantalla, {
            metadata: { nombre: miNombre + " [Pantalla]" }
        });

        callPantalla.on("stream", () => {}); // requerido para que PeerJS procese la conexión

        // Si el usuario detiene desde el navegador (botón "Dejar de compartir")
        streamPantalla.getVideoTracks()[0].onended = () => detenerPantalla();

        btn.innerText = "🛑 Dejar de Compartir";
        btn.style.background = "#dc3545";

        if (connData && connData.open) {
            connData.send({ tipo: "pantalla_iniciada", de: miNombre });
        }

    } catch (err) {
        if (err.name !== "NotAllowedError") {
            console.error("Error compartir pantalla:", err);
            alert("No se pudo compartir la pantalla.");
        }
        streamPantalla = null;
    }
}

function detenerPantalla() {
    if (streamPantalla) {
        streamPantalla.getTracks().forEach(t => t.stop());
        streamPantalla = null;
    }
    if (callPantalla) { callPantalla.close(); callPantalla = null; }

    const box = document.getElementById("box-pantalla-local");
    if (box) box.remove();

    const btn = document.getElementById("btnPantalla");
    if (btn) { btn.innerText = "🖥️ Compartir Pantalla"; btn.style.background = "#6f42c1"; }

    if (connData && connData.open) {
        connData.send({ tipo: "pantalla_detenida", de: miNombre });
    }
}
